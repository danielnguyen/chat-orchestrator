name: chat-orchestrator-artifact-composed-smoke

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smoke
      POSTGRES_PASSWORD: smoke
      POSTGRES_DB: memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smoke -d memory"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest-unprivileged
    ports:
      - "14491:6333"
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':18BD .* 0A' /proc/net/tcp"]
      interval: 1s
      timeout: 3s
      retries: 30
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      default:
        aliases:
          - minio-internal
    ports:
      - "14400:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    tmpfs:
      - /data

  minio-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio-internal:9000 minioadmin minioadmin
        mc mb -p local/memory-artifacts

  provider:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["uvicorn", "tools.composed_provider_stub:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "14481:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 1s
      timeout: 3s
      retries: 30

  bms-migrate:
    build:
      context: ../basic-memory-store
      dockerfile: api/Dockerfile
    command: ["python", "-m", "tools.schema_migrations", "upgrade"]
    environment:
      PG_DSN: postgresql://smoke:smoke@postgres:5432/memory
    depends_on:
      postgres:
        condition: service_healthy

  bms:
    build:
      context: ../basic-memory-store
      dockerfile: api/Dockerfile
    environment:
      MEMORY_API_KEY: smoke-memory-key
      PG_DSN: postgresql://smoke:smoke@postgres:5432/memory
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: messages
      LITELLM_BASE_URL: http://provider:8000
      CHAT_MODEL: chat_voice_openai
      EMBED_MODEL: local-deterministic
      OBJECT_STORE_ENABLED: "true"
      OBJECT_STORE_ENDPOINT: http://minio-internal:9000
      OBJECT_STORE_PRESIGN_BASE_URL: http://127.0.0.1:14400
      OBJECT_STORE_BUCKET: memory-artifacts
      OBJECT_STORE_ACCESS_KEY: minioadmin
      OBJECT_STORE_SECRET_KEY: minioadmin
      OBJECT_STORE_REGION: us-east-1
      OBJECT_STORE_INCLUDE_CONTENT_TYPE_IN_PUT_SIGNATURE: "true"
      ARTIFACT_TEXT_DERIVATION_MAX_BYTES: "262144"
      RETRIEVAL_ARTIFACT_K: "8"
      RETRIEVAL_ARTIFACT_MAX_SNIPPET_CHARS: "320"
      REQUIRE_REQUEST_ID: "true"
      ENFORCE_REQUEST_ID_HEADER_BODY_MATCH: "true"
      ENABLE_TRACE_STORAGE: "true"
      INDEX_USER_QUESTIONS: "false"
      INDEX_ASSISTANT_MESSAGES: "false"
    ports:
      - "14421:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      provider:
        condition: service_healthy
      minio-bucket:
        condition: service_completed_successfully
      bms-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 1s
      timeout: 3s
      retries: 30

  orchestrator:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      ORCH_API_KEY: smoke-orchestrator-key
      MEMORY_STORE_BASE_URL: http://bms:8000
      MEMORY_STORE_API_KEY: smoke-memory-key
      LITELLM_BASE_URL: http://provider:8000
      ROUTER_RULES_PATH: /app/router/rules.yaml
      MODEL_REGISTRY_PATH: /app/router/model_registry.artifact_smoke.yaml
      ALLOW_MANUAL_OVERRIDE: "false"
      COGNITIVE_RUNTIME_PRIVACY_CONTEXT_ENABLED: "true"
      COGNITIVE_RUNTIME_MEMORY_HYGIENE_ENABLED: "false"
      ENABLE_RUNTIME_OVERLAYS: "false"
      COGNITIVE_RUNTIME_COMPANION_ENABLED: "false"
      COGNITIVE_RUNTIME_INTERACTION_GOVERNANCE_ENABLED: "false"
      COGNITIVE_RUNTIME_PERSONA_CONTAINMENT_ENABLED: "false"
      COGNITIVE_RUNTIME_RESTRAINT_ENABLED: "false"
      DSA_ENABLED: "false"
      PROMPT_OUTPUT_TOKEN_RESERVE: "0"
      PROMPT_CONTEXT_SAFETY_MARGIN: "0"
    ports:
      - "14461:8000"
    depends_on:
      bms:
        condition: service_healthy
      provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  qdrant-data:
